server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Ensure standard MIME types are loaded
    include /etc/nginx/mime.types;
    types {
        text/javascript mjs;
    }

    # Explicitly force correct Content-Type for .mjs files.
    # This bypasses any ambiguity in how types{} merges with mime.types.
    location ~* \.mjs$ {
        default_type text/javascript;
        try_files $uri =404;
    }

    # SPA fallback - same idea as your vercel.json rewrites rule
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}